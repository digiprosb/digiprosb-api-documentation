# Repo: https://github.com/digiprosb-payment/socx-api-documentation
#
# WAJIB: jalankan MkDocs dari folder yang berisi file INI (bukan dari parent monorepo lain):
#   cd <repo-docs> && mkdocs serve
# Lihat README.md — bagian "Pratinjau lokal (MkDocs)".

site_name: Dokumentasi API Digiprosb
strict: true
site_description: Integrasi H2H Reseller Digiprosb — direct purchase, saldo, status, inquiry
site_author: Digiprosb

repo_url: https://github.com/digiprosb-payment/socx-api-documentation
edit_uri: edit/main/doc/

docs_dir: doc

theme:
  name: material
  language: id
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mode gelap
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mode terang
  features:
    # navigation.instant dinonaktifkan: cache pratinjau bisa menampilkan item nav lama
    # (mis. judul halaman yang sudah dihapus/diubah) sampai hard refresh.
    - navigation.tracking
    - navigation.expand
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra_css:
  - stylesheets/nav-colors.css

nav:
  - Beranda: index.md
  - Pengenalan & persiapan integrasi: 02-persiapan-integrasi.md
  - Prepaid (Pulsa, Data):
      - "Pulsa & Data": transaksi-direct/pembelian-pulsa-data.md
  - Game:
      - "Topup Game & Voucher": game/topup-voucher.md
  - E-wallet:
      - "Ewallet Direct Purchase": ewallet/ewallet-direct-purchase.md
      - "Ewallet Open Amount": ewallet/e-wallet-open-amount.md
  - PLN Prepaid: pln-prepaid.md
  - Referensi Teknis:
      - Cek saldo: transaksi-direct/cek-saldo.md
      - Cek status: transaksi-direct/cek-status.md
      - Deposit tiket: appendix-deposit-ticket.md
      - Kode respons (RC): transaksi-direct/kode-respons.md

extra:
  generator: false

